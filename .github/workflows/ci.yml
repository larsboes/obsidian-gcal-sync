name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      # Publish a rolling canary pre-release on every push to main (not PRs)
      - name: Publish canary release
        if: github.event_name == 'push'
        env:
          PLUGIN_NAME: obsidian-gcal-sync
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(jq -r .version manifest.json)
          TAG="${VERSION}-canary.$(date -u +%Y%m%d%H%M%S)"

          mkdir $PLUGIN_NAME
          cp dist/main.js manifest.json manifest-beta.json $PLUGIN_NAME
          zip -r ${PLUGIN_NAME}-${TAG}.zip $PLUGIN_NAME

          gh release create "$TAG" \
            --prerelease \
            --title "Canary ${TAG}" \
            --notes "Auto-built from \`$(git rev-parse --short HEAD)\` on \`main\`." \
            dist/main.js \
            manifest.json \
            manifest-beta.json \
            ${PLUGIN_NAME}-${TAG}.zip
